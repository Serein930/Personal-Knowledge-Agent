services:
  agentmind-postgres:
    image: pgvector/pgvector:pg16
    container_name: agentmind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agentmind
      POSTGRES_USER: agentmind
      POSTGRES_PASSWORD: agentmind_dev_password
    ports:
      # 本机已有 PostgreSQL 时，可通过 AGENTMIND_POSTGRES_PORT 改用其他端口。
      - "${AGENTMIND_POSTGRES_PORT:-5432}:5432"
    volumes:
      - agentmind-postgres-data:/var/lib/postgresql/data
      - ./backend/src/main/resources/db/schema/knowledge_vector_chunks.sql:/docker-entrypoint-initdb.d/01-knowledge-vector-chunks.sql:ro
      - ./backend/src/main/resources/db/schema/rag_model_call_observations.sql:/docker-entrypoint-initdb.d/02-rag-model-call-observations.sql:ro
      - ./backend/src/main/resources/db/schema/agent_write_tools.sql:/docker-entrypoint-initdb.d/03-agent-write-tools.sql:ro
      - ./backend/src/main/resources/db/schema/rag_evaluations.sql:/docker-entrypoint-initdb.d/04-rag-evaluations.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentmind -d agentmind"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  agentmind-redis:
    image: redis:7.4-alpine
    container_name: agentmind-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - agentmind-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  agentmind-postgres-data:
  agentmind-redis-data:
