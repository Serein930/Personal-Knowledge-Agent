services:
  agentmind-postgres:
    image: pgvector/pgvector:pg16
    container_name: agentmind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agentmind
      POSTGRES_USER: agentmind
      POSTGRES_PASSWORD: agentmind_dev_password
    ports:
      # 本机已有 PostgreSQL 时，可通过 AGENTMIND_POSTGRES_PORT 改用其他端口。
      - "${AGENTMIND_POSTGRES_PORT:-5432}:5432"
    volumes:
      - agentmind-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentmind -d agentmind"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  agentmind-redis:
    image: redis:7.4-alpine
    container_name: agentmind-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - agentmind-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  agentmind-opensearch:
    image: opensearchproject/opensearch:2.17.1
    container_name: agentmind-opensearch
    profiles: ["opensearch"]
    restart: unless-stopped
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "${AGENTMIND_OPENSEARCH_PORT:-9200}:9200"
    volumes:
      - agentmind-opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  agentmind-prometheus:
    image: prom/prometheus:v3.4.1
    container_name: agentmind-prometheus
    profiles: ["observability"]
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro

  agentmind-tempo:
    image: grafana/tempo:2.8.1
    container_name: agentmind-tempo
    profiles: ["observability"]
    command: ["-config.file=/etc/tempo.yml"]
    ports:
      - "4318:4318"
      - "3200:3200"
    volumes:
      - ./observability/tempo/tempo.yml:/etc/tempo.yml:ro

  agentmind-grafana:
    image: grafana/grafana:12.0.1
    container_name: agentmind-grafana
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${AGENTMIND_GRAFANA_PASSWORD:-agentmind_dev_password}
    ports:
      - "3000:3000"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - agentmind-grafana-data:/var/lib/grafana
    depends_on:
      - agentmind-prometheus
      - agentmind-tempo

volumes:
  agentmind-postgres-data:
  agentmind-redis-data:
  agentmind-opensearch-data:
  agentmind-grafana-data:
