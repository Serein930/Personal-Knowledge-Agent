version: "3.9"

x-backend-environment: &backend-environment
  SPRING_PROFILES_ACTIVE: production
  AGENTMIND_INSTANCE_ID: "{{.Service.Name}}-{{.Task.Slot}}"
  AGENTMIND_SECURITY_MODE: ${AGENTMIND_SECURITY_MODE:-oidc}
  AGENTMIND_OIDC_ISSUER_URI: ${AGENTMIND_OIDC_ISSUER_URI}
  AGENTMIND_OIDC_AUDIENCE: ${AGENTMIND_OIDC_AUDIENCE}
  AGENTMIND_DATABASE_URL: ${AGENTMIND_DATABASE_URL}
  AGENTMIND_DATABASE_USERNAME: ${AGENTMIND_DATABASE_USERNAME:-agentmind}
  AGENTMIND_REDIS_HOST: ${AGENTMIND_REDIS_HOST}
  AGENTMIND_REDIS_PORT: ${AGENTMIND_REDIS_PORT:-6379}
  AGENTMIND_REDIS_SSL: ${AGENTMIND_REDIS_SSL:-true}
  AGENTMIND_MINIO_ENDPOINT: ${AGENTMIND_MINIO_ENDPOINT}
  AGENTMIND_MINIO_BUCKET: ${AGENTMIND_MINIO_BUCKET:-agentmind}
  AGENTMIND_OPENSEARCH_URL: ${AGENTMIND_OPENSEARCH_URL}
  AGENTMIND_OPENSEARCH_USERNAME: ${AGENTMIND_OPENSEARCH_USERNAME:-agentmind}
  AGENTMIND_ALLOWED_ORIGIN: ${AGENTMIND_ALLOWED_ORIGIN}
  AGENTMIND_TRUSTED_PROXY_CIDRS: ${AGENTMIND_TRUSTED_PROXY_CIDRS}
  AGENTMIND_TRACING_ENABLED: ${AGENTMIND_TRACING_ENABLED:-true}
  AGENTMIND_OTLP_TRACING_ENDPOINT: ${AGENTMIND_OTLP_TRACING_ENDPOINT}

x-backend-secrets: &backend-secrets
  - source: database_password
    target: spring.datasource.password
  - source: redis_password
    target: spring.data.redis.password
  - source: minio_access_key
    target: agentmind.storage.minio.access-key
  - source: minio_secret_key
    target: agentmind.storage.minio.secret-key
  - source: opensearch_password
    target: agentmind.keyword-index.opensearch.password

x-backend-service: &backend-service
  environment: *backend-environment
  secrets: *backend-secrets
  networks:
    - agentmind-production
  healthcheck:
    test: ["CMD", "wget", "-qO-", "http://localhost:8081/actuator/health/readiness"]
    interval: 15s
    timeout: 5s
    retries: 4
    start_period: 40s
  stop_grace_period: 45s

services:
  agentmind-backend:
    <<: *backend-service
    image: ${AGENTMIND_BACKEND_IMAGE}
    deploy:
      replicas: 2
      endpoint_mode: vip
      update_config:
        parallelism: 1
        delay: 20s
        monitor: 30s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
        monitor: 30s
        failure_action: pause
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  # 灰度实例始终保留一个副本；未发布新版本时与稳定组使用同一镜像，避免分流到空服务。
  agentmind-backend-canary:
    <<: *backend-service
    image: ${AGENTMIND_CANARY_IMAGE}
    deploy:
      replicas: 1
      endpoint_mode: vip
      update_config:
        parallelism: 1
        monitor: 45s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 1
        monitor: 30s
        failure_action: pause
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 384M

  agentmind-gateway:
    image: nginx:1.27-alpine@sha256:65645c7bb6a0661892a8b03b89d0743208a18dd2f3f17a54ef4b76fb8e2f2a10
    user: "101:101"
    read_only: true
    configs:
      - source: gateway_configuration
        target: /etc/nginx/nginx.conf
        mode: 0444
    secrets:
      - source: tls_certificate
        target: agentmind_tls_certificate.pem
      - source: tls_private_key
        target: agentmind_tls_private_key.pem
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    ports:
      - target: 8080
        published: 80
        protocol: tcp
        mode: ingress
      - target: 8443
        published: 443
        protocol: tcp
        mode: ingress
    networks:
      - agentmind-production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/gateway-health"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 10s
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        monitor: 20s
        failure_action: rollback
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 3s
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M

networks:
  agentmind-production:
    external: true

configs:
  gateway_configuration:
    file: ./gateway/nginx.conf

secrets:
  database_password:
    external: true
    name: ${AGENTMIND_DATABASE_PASSWORD_SECRET_NAME:-agentmind_database_password}
  redis_password:
    external: true
    name: ${AGENTMIND_REDIS_PASSWORD_SECRET_NAME:-agentmind_redis_password}
  minio_access_key:
    external: true
    name: ${AGENTMIND_MINIO_ACCESS_KEY_SECRET_NAME:-agentmind_minio_access_key}
  minio_secret_key:
    external: true
    name: ${AGENTMIND_MINIO_SECRET_KEY_SECRET_NAME:-agentmind_minio_secret_key}
  opensearch_password:
    external: true
    name: ${AGENTMIND_OPENSEARCH_PASSWORD_SECRET_NAME:-agentmind_opensearch_password}
  tls_certificate:
    external: true
    name: ${AGENTMIND_TLS_CERTIFICATE_SECRET_NAME:-agentmind_tls_certificate}
  tls_private_key:
    external: true
    name: ${AGENTMIND_TLS_PRIVATE_KEY_SECRET_NAME:-agentmind_tls_private_key}
