# Nginx 以非特权用户运行，所有临时文件都写入只读根文件系统之外的 tmpfs。
pid /tmp/nginx.pid;

events {
    worker_connections 2048;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;

    client_body_temp_path /tmp/client_body;
    proxy_temp_path /tmp/proxy;
    fastcgi_temp_path /tmp/fastcgi;
    uwsgi_temp_path /tmp/uwsgi;
    scgi_temp_path /tmp/scgi;

    log_format agentmind '$remote_addr - $request_id [$time_local] "$request" $status '
                         '$body_bytes_sent "$http_referer" "$http_user_agent" '
                         'upstream=$upstream_addr upstream_time=$upstream_response_time';
    access_log /dev/stdout agentmind;
    error_log /dev/stderr warn;

    # 网关限流用于吸收突发流量，业务精确配额仍由 Redis 分布式限流负责。
    limit_req_zone $binary_remote_addr zone=public_api:10m rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=public_connections:10m;

    upstream agentmind_pool {
        zone agentmind_pool 64k;
        server agentmind-backend:8081 weight=9 max_fails=2 fail_timeout=10s;
        server agentmind-backend-canary:8081 weight=1 max_fails=2 fail_timeout=10s;
        keepalive 64;
    }

    server {
        listen 8080;
        server_name _;

        location = /gateway-health {
            access_log off;
            default_type text/plain;
            return 200 'ok';
        }

        location / {
            return 308 https://$host$request_uri;
        }
    }

    server {
        listen 8443 ssl;
        server_name _;

        ssl_certificate /run/secrets/agentmind_tls_certificate.pem;
        ssl_certificate_key /run/secrets/agentmind_tls_private_key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_session_cache shared:TLS:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        client_max_body_size 25m;
        keepalive_timeout 65s;
        limit_conn public_connections 50;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy no-referrer always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        location / {
            limit_req zone=public_api burst=60 nodelay;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;

            # 外部同名头一律覆盖，应用只接收网关生成的真实连接信息。
            proxy_set_header Forwarded "for=$remote_addr;proto=https;host=$host";
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Request-Id $request_id;

            # SSE 不能被代理缓冲；普通 JSON 接口同样可直接受益于更短的首字节延迟。
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_connect_timeout 3s;
            proxy_send_timeout 75s;
            proxy_read_timeout 75s;
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
            proxy_pass http://agentmind_pool;
        }
    }
}
