version: 2
updates:
  # 发布安全依赖 Action 本身也必须持续获取安全更新，避免长期固定在已知漏洞版本。
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: maven
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
