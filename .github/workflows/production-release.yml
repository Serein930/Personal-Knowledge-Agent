name: 正式版本发布

on:
  workflow_dispatch:
    inputs:
      version:
        description: 使用 v 开头的语义化版本，例如 v1.0.0
        required: true
        type: string
      final_approval_run_id:
        description: 成功的“最终发布审批”工作流运行编号
        required: true
        type: string
      prerelease:
        description: 是否创建预发布版本
        required: true
        default: false
        type: boolean

permissions:
  actions: read
  contents: read

concurrency:
  group: agentmind-production-release
  cancel-in-progress: false

jobs:
  verify_final_approval:
    name: 验证最终审批并生成正式发布清单
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      manifest_artifact_name: ${{ steps.manifest.outputs.artifact_name }}
    steps:
      - name: 检出待发布提交
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 校验审批运行编号格式
        shell: bash
        run: |
          if ! [[ "${{ inputs.final_approval_run_id }}" =~ ^[1-9][0-9]*$ ]]; then
            echo "最终审批运行编号必须是正整数" >&2
            exit 1
          fi

      - name: 下载最终发布审批产物
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: final-release-approval-*
          path: .production-release-input
          merge-multiple: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.final_approval_run_id }}

      - name: 生成正式发布清单
        id: manifest
        shell: pwsh
        run: |
          ./scripts/new-production-release-manifest.ps1 `
            -FinalApprovalEvidenceDirectory .production-release-input `
            -GitCommit $env:GITHUB_SHA `
            -Version "${{ inputs.version }}" `
            -FinalApprovalWorkflowRunId "${{ inputs.final_approval_run_id }}"
          "artifact_name=production-release-candidate-$env:GITHUB_SHA" | Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: 保存正式发布候选清单
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: production-release-candidate-${{ github.sha }}
          path: .production-release/production-release-manifest.json
          if-no-files-found: error
          retention-days: 365

  protected_production_release:
    name: 受保护环境正式发布
    needs: verify_final_approval
    permissions:
      actions: read
      contents: write
    runs-on: ubuntu-latest
    environment: production-release
    timeout-minutes: 10
    steps:
      - name: 验证正式发布环境已经显式配置
        shell: bash
        env:
          RELEASE_GUARD: ${{ secrets.PRODUCTION_RELEASE_GUARD }}
        run: |
          if [ -z "$RELEASE_GUARD" ]; then
            echo "production-release Environment 缺少发布守卫秘密" >&2
            exit 1
          fi

      - name: 下载已验证的正式发布清单
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.verify_final_approval.outputs.manifest_artifact_name }}
          path: .production-release

      - name: 创建或核对幂等 GitHub Release
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          manifest=.production-release/production-release-manifest.json
          jq -e --arg commit "$GITHUB_SHA" --arg version "$VERSION" \
            '.passed == true and .gitCommit == $commit and .version == $version' "$manifest" >/dev/null

          existing="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$VERSION" 2>/dev/null || true)"
          if [ -n "$existing" ]; then
            target="$(jq -r '.target_commitish' <<<"$existing")"
            if [ "$target" != "$GITHUB_SHA" ]; then
              echo "版本 $VERSION 已存在但指向其他提交：$target" >&2
              exit 1
            fi
            release_json="$existing"
          else
            candidate_image="$(jq -r '.candidateImage' "$manifest")"
            release_candidate_id="$(jq -r '.releaseCandidateId' "$manifest")"
            approval_run_id="$(jq -r '.finalApprovalWorkflowRunId' "$manifest")"
            jq -n \
              --arg tag "$VERSION" \
              --arg commit "$GITHUB_SHA" \
              --arg name "AgentMind $VERSION" \
              --arg image "$candidate_image" \
              --arg candidate "$release_candidate_id" \
              --arg approval "$approval_run_id" \
              --argjson prerelease "$PRERELEASE" \
              '{
                tag_name: $tag,
                target_commitish: $commit,
                name: $name,
                body: ("不可变候选镜像：`" + $image + "`\n\n发布候选：`" + $candidate + "`\n\n最终审批运行：`" + $approval + "`"),
                draft: false,
                prerelease: $prerelease,
                generate_release_notes: true
              }' > .production-release/release-request.json
            release_json="$(gh api --method POST "repos/$GITHUB_REPOSITORY/releases" --input .production-release/release-request.json)"
          fi

          release_id="$(jq -r '.id' <<<"$release_json")"
          release_url="$(jq -r '.html_url' <<<"$release_json")"
          manifest_sha="$(sha256sum "$manifest" | cut -d ' ' -f 1)"
          candidate_image="$(jq -r '.candidateImage' "$manifest")"
          jq -n \
            --arg version "$VERSION" \
            --arg gitCommit "$GITHUB_SHA" \
            --arg releaseId "$release_id" \
            --arg releaseUrl "$release_url" \
            --arg releaseManifestSha256 "$manifest_sha" \
            --arg candidateImage "$candidate_image" \
            --arg releasedAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              schemaVersion: "1.0",
              evidenceType: "production_release",
              version: $version,
              gitCommit: $gitCommit,
              githubReleaseId: $releaseId,
              githubReleaseUrl: $releaseUrl,
              releaseManifestSha256: $releaseManifestSha256,
              candidateImage: $candidateImage,
              releasedAt: $releasedAt,
              passed: true
            }' > .production-release/production-release-record.json

      - name: 保存正式发布记录
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: production-release-${{ inputs.version }}
          path: |
            .production-release/production-release-manifest.json
            .production-release/production-release-record.json
          if-no-files-found: error
          retention-days: 365
