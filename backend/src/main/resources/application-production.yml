spring:
  config:
    activate:
      on-profile: production
    # Docker/Kubernetes/Vault Agent 均可把秘密以同名文件挂载到该目录。
    import: optional:configtree:${AGENTMIND_SECRETS_PATH:/run/secrets/}
  datasource:
    url: ${AGENTMIND_DATABASE_URL}
    username: ${AGENTMIND_DATABASE_USERNAME:agentmind}
    hikari:
      maximum-pool-size: ${AGENTMIND_DATABASE_POOL_MAX_SIZE:20}
      minimum-idle: ${AGENTMIND_DATABASE_POOL_MIN_IDLE:5}
      connection-timeout: 5s
      validation-timeout: 3s
  data:
    redis:
      host: ${AGENTMIND_REDIS_HOST}
      port: ${AGENTMIND_REDIS_PORT:6379}
      ssl:
        enabled: ${AGENTMIND_REDIS_SSL:true}
      timeout: 2s
  ai:
    model:
      chat: ${AGENTMIND_SPRING_AI_CHAT_MODEL:openai}
      embedding: ${AGENTMIND_SPRING_AI_EMBEDDING_MODEL:openai}
    openai:
      # 生产环境不允许使用本地占位值，未注入密钥时应在启动阶段暴露配置错误。
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: ${AGENTMIND_CHAT_MODEL:gpt-4o-mini}
          temperature: ${AGENTMIND_CHAT_TEMPERATURE:0.2}

server:
  shutdown: graceful
  # 转发头由自定义可信代理过滤器校验，禁止框架在校验前直接采用客户端头部。
  forward-headers-strategy: none
  tomcat:
    connection-timeout: 10s

spring.lifecycle.timeout-per-shutdown-phase: 30s

management:
  endpoint:
    health:
      probes:
        enabled: true
        add-additional-paths: true
      show-details: never
      group:
        readiness:
          include: readinessState,db,redis
  health:
    # 生产限流和会话记忆依赖 Redis，必须将连接状态纳入整体健康结果。
    redis:
      enabled: true
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

agentmind:
  rag:
    # 生产环境固定使用真实模型适配器，不能因为公共默认值而静默退回 Mock。
    answer-generator: spring-ai
    model-name: ${AGENTMIND_RAG_MODEL_NAME:${AGENTMIND_CHAT_MODEL:gpt-4o-mini}}
    spring-ai-failure-fallback-enabled: ${AGENTMIND_RAG_FAILURE_FALLBACK_ENABLED:true}
    observation-store: jdbc
  embedding:
    provider: spring-ai
    model-name: ${AGENTMIND_EMBEDDING_MODEL:text-embedding-3-small}
    dimensions: ${AGENTMIND_EMBEDDING_DIMENSIONS:128}
    batch-size: ${AGENTMIND_EMBEDDING_BATCH_SIZE:32}
    maximum-attempts: ${AGENTMIND_EMBEDDING_MAXIMUM_ATTEMPTS:3}
    retry-initial-backoff: ${AGENTMIND_EMBEDDING_RETRY_INITIAL_BACKOFF:200ms}
    input-cost-per-million-tokens: ${AGENTMIND_EMBEDDING_INPUT_COST_PER_MILLION_TOKENS:0}
  security:
    mode: ${AGENTMIND_SECURITY_MODE:oidc}
    issuer-uri: ${AGENTMIND_OIDC_ISSUER_URI:}
    audience: ${AGENTMIND_OIDC_AUDIENCE:}
  core:
    persistence:
      store: jdbc
  agent:
    persistence:
      # Agent 确认单、工具审计、笔记和学习系统禁止回退到单实例内存。
      store: jdbc
  evaluation:
    # 评估集、任务租约和逐题结果必须跨实例持久化。
    store: jdbc
  rate-limit:
    mode: redis
    fail-open: false
    client-ip-header: X-Forwarded-For
  web:
    allowed-origin: ${AGENTMIND_ALLOWED_ORIGIN}
    trusted-proxy:
      enabled: true
      require-https: true
      cidrs: ${AGENTMIND_TRUSTED_PROXY_CIDRS}
  storage:
    type: minio
    minio:
      endpoint: ${AGENTMIND_MINIO_ENDPOINT}
      bucket: ${AGENTMIND_MINIO_BUCKET:agentmind}
  vector-store:
    type: pgvector
    embedding-dimensions: ${AGENTMIND_EMBEDDING_DIMENSIONS:128}
  keyword-index:
    type: opensearch
    opensearch:
      base-url: ${AGENTMIND_OPENSEARCH_URL}
      username: ${AGENTMIND_OPENSEARCH_USERNAME}
  knowledge-index:
    outbox:
      enabled: true
  chat:
    memory:
      store: redis
