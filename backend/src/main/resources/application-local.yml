spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:5432/agentmind
    username: agentmind
    password: agentmind_dev_password

agentmind:
  security:
    mode: ${AGENTMIND_SECURITY_MODE:disabled}
  core:
    persistence:
      store: ${AGENTMIND_CORE_PERSISTENCE_STORE:memory}
  agent:
    persistence:
      store: jdbc
  vector-store:
    type: pgvector
    embedding-dimensions: 128
  keyword-index:
    type: ${AGENTMIND_KEYWORD_INDEX_TYPE:memory}
  knowledge-index:
    outbox:
      enabled: ${AGENTMIND_KNOWLEDGE_INDEX_OUTBOX_ENABLED:false}
  evaluation:
    store: jdbc
