spring:
  config:
    activate:
      on-profile: local
  servlet:
    multipart:
      # 本地知识库允许上传较大的教材；生产环境应根据网关、内存和对象存储能力单独设置。
      max-file-size: ${AGENTMIND_HTTP_MAX_FILE_SIZE:150MB}
      max-request-size: ${AGENTMIND_HTTP_MAX_REQUEST_SIZE:155MB}
  datasource:
    url: jdbc:postgresql://localhost:5432/agentmind
    username: agentmind
    password: agentmind_dev_password
  data:
    redis:
      host: ${AGENTMIND_REDIS_HOST:localhost}
      port: ${AGENTMIND_REDIS_PORT:6379}
      database: ${AGENTMIND_REDIS_DATABASE:0}
      password: ${AGENTMIND_REDIS_PASSWORD:}
      connect-timeout: 2s
      timeout: 2s

agentmind:
  ingestion:
    # 与前端本地默认值保持一致，业务层仍会执行一次明确的大小校验。
    max-upload-size-bytes: ${AGENTMIND_INGESTION_MAX_UPLOAD_SIZE_BYTES:157286400}
  demo:
    seed-data: false
  web:
    # Vite 可能通过 localhost 或 127.0.0.1 打开，两种本机来源都允许访问携带 JWT 的接口。
    allowed-origin: ${AGENTMIND_ALLOWED_ORIGIN:http://localhost:5173,http://127.0.0.1:5173}
  security:
    # JDBC 模式不依赖固定种子用户；通过注册接口创建真实用户和默认知识空间。
    mode: ${AGENTMIND_SECURITY_MODE:local-jwt}
    # 仅供本机开发，生产 profile 不读取该默认值，并会强制校验外部秘密。
    jwt-secret: ${AGENTMIND_JWT_SECRET:agentmind-local-jwt-signing-secret-change-me}
  core:
    persistence:
      # local 用于真实依赖联调，用户、知识空间和文档元数据必须写入 PostgreSQL。
      store: jdbc
  agent:
    persistence:
      # Agent 审计、确认单、笔记、卡片和学习画像共享同一套 JDBC 持久化开关。
      store: jdbc
  vector-store:
    type: pgvector
    embedding-dimensions: ${AGENTMIND_EMBEDDING_DIMENSIONS:128}
  keyword-index:
    type: ${AGENTMIND_KEYWORD_INDEX_TYPE:memory}
  knowledge-index:
    outbox:
      enabled: ${AGENTMIND_KNOWLEDGE_INDEX_OUTBOX_ENABLED:false}
  evaluation:
    store: jdbc
  rag:
    # 回答模型仍可使用公共 Mock 默认值，但每次调用的观测记录必须真实持久化。
    observation-store: jdbc
  study:
    flashcard:
      web-supplement:
        # 本地启动脚本会自动拉起 SearXNG，因此本地 profile 默认开启联网补充。
        enabled: ${AGENTMIND_FLASHCARD_WEB_SEARCH_ENABLED:true}
        provider: ${AGENTMIND_WEB_SEARCH_PROVIDER:searxng}
        base-url: ${AGENTMIND_WEB_SEARCH_BASE_URL:http://localhost:8888}
  chat:
    memory:
      # 本地真实联调使用 Redis，确保重启后会话仍可恢复并验证 TTL 行为。
      store: redis
