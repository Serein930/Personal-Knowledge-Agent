spring:
  application:
    name: agentmind-backend
  ai:
    model:
      chat: none
    openai:
      api-key: ${OPENAI_API_KEY:agentmind-local-placeholder}
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.agentmind: INFO

agentmind:
  storage:
    local-root: .agentmind-storage
  vector-store:
    type: memory
    embedding-dimensions: 128
  rag:
    answer-generator: mock
    prompt-version: rag-chat-v1
    model-name: mock-local
    minimum-citation-score: 0.05
    max-context-citations: 5
    spring-ai-failure-fallback-enabled: true
    stream-timeout-millis: 60000
    stream-chunk-size: 24
    observation-store: memory
  ingestion:
    max-upload-size-bytes: 20971520
    web-fetch-timeout-seconds: 8
    web-fetch-max-bytes: 1048576
