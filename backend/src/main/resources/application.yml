spring:
  application:
    name: agentmind-backend
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
  data:
    redis:
      repositories:
        enabled: false
  ai:
    model:
      chat: none
    openai:
      api-key: ${OPENAI_API_KEY:agentmind-local-placeholder}
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

server:
  port: 8081

management:
  tracing:
    enabled: ${AGENTMIND_TRACING_ENABLED:false}
    sampling:
      probability: ${AGENTMIND_TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${AGENTMIND_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    com.agentmind: INFO

agentmind:
  web:
    allowed-origin: ${AGENTMIND_ALLOWED_ORIGIN:http://localhost:5173}
  agent:
    persistence:
      store: memory
    write-proposal:
      generator: rule
      prompt-version: write-tool-proposal-v1
      fallback-to-rule-enabled: true
    write-confirmation:
      ttl: 5m
    confirmation-maintenance:
      enabled: true
      fixed-delay-millis: 60000
      initial-delay-millis: 60000
      executing-timeout: 10m
      batch-size: 100
  storage:
    local-root: .agentmind-storage
  vector-store:
    type: memory
    embedding-dimensions: 128
  keyword-index:
    type: memory
    opensearch:
      base-url: ${AGENTMIND_OPENSEARCH_URL:http://localhost:9200}
      index-name: ${AGENTMIND_OPENSEARCH_INDEX:agentmind-knowledge-chunks}
      username: ${AGENTMIND_OPENSEARCH_USERNAME:}
      password: ${AGENTMIND_OPENSEARCH_PASSWORD:}
  knowledge-index:
    outbox:
      # 默认关闭以保持内存开发模式零外部依赖；生产双写时必须显式开启。
      enabled: ${AGENTMIND_KNOWLEDGE_INDEX_OUTBOX_ENABLED:false}
      instance-id: ${AGENTMIND_INSTANCE_ID:}
      batch-size: 50
      lease-duration: 30s
      base-retry-delay: 2s
      maximum-retry-delay: 5m
      maximum-attempts: 8
      fixed-delay-millis: 1000
      initial-delay-millis: 3000
      rebuild-document-batch-size: 100
  rag:
    answer-generator: mock
    prompt-version: rag-chat-v1
    model-name: mock-local
    minimum-citation-score: 0.05
    max-context-citations: 5
    spring-ai-failure-fallback-enabled: true
    stream-timeout-millis: 60000
    stream-chunk-size: 24
    tool-calling-enabled: true
    max-tool-round-trips: 4
    write-tool-proposals-enabled: true
    observation-store: memory
  evaluation:
    store: memory
    maximum-cases-per-version: 200
    chunk-strategy-version: markdown-aware-v1
    executor-core-pool-size: 2
    executor-max-pool-size: 4
    executor-queue-capacity: 100
    maximum-import-bytes: 5242880
    lease-duration: 30s
    heartbeat-interval: 10s
    recovery-fixed-delay-millis: 15000
    recovery-initial-delay-millis: 5000
    recovery-batch-size: 50
    recovery-enabled: true
    rrf-rank-constant: 60
    judge-prompt-version: rag-judge-v1
    judge-model-name: ${AGENTMIND_EVALUATION_JUDGE_MODEL:deterministic-local}
    judge-failure-fallback-enabled: true
    judge:
      type: deterministic
    # 单价单位为美元/百万令牌；本地默认零成本，真实模型联调时通过环境配置覆盖。
    input-cost-per-million-tokens: ${AGENTMIND_EVALUATION_INPUT_COST:0}
    output-cost-per-million-tokens: ${AGENTMIND_EVALUATION_OUTPUT_COST:0}
  chat:
    memory:
      store: memory
      max-history-turns: 12
      history-scan-message-limit: 200
      model-context-window-tokens: 8192
      reserved-context-tokens: 4096
      key-prefix: agentmind:chat-memory
      serialization-version: 1
      ttl: 7d
  study:
    time-zone: Asia/Shanghai
    flashcard:
      algorithm: sm2
    maintenance:
      enabled: false
      fixed-delay-millis: 21600000
      initial-delay-millis: 60000
      minimum-optimization-interval: 7d
      batch-size: 100
  ingestion:
    max-upload-size-bytes: 20971520
    web-fetch-timeout-seconds: 8
    web-fetch-max-bytes: 1048576
