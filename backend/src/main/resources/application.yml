spring:
  application:
    name: agentmind-backend
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.agentmind: INFO

agentmind:
  storage:
    local-root: .agentmind-storage
  vector-store:
    type: memory
    embedding-dimensions: 128
  ingestion:
    max-upload-size-bytes: 20971520
    web-fetch-timeout-seconds: 8
    web-fetch-max-bytes: 1048576
